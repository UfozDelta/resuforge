server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: ${COOKIE_SAME_SITE:Lax}
        secure: ${COOKIE_SECURE:false}

spring:
  mvc:
    async:
      # SSE pipelines can take 3+ minutes (multiple LLM calls + tectonic compile).
      # -1 disables the Tomcat async timeout so SseEmitter controls its own lifecycle.
      request-timeout: -1
  datasource:
    url:      ${DB_URL:}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

llm:
  provider: gemini
  api-key:  ${GEMINI_API_KEY:}
  model:
    generate: gemini-2.5-flash
    match:    gemini-2.5-flash
    clean-jd: gemini-2.5-flash-lite

tectonic:
  binary: ${TECTONIC_BIN:tectonic}
  timeout-seconds: 30

auth:
  seed:
    username: ${SEED_USERNAME:admin}
    email:    ${SEED_EMAIL:admin@localhost}
    password: ${SEED_PASSWORD:}

cors:
  allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

# Profile now lives in DB (Flyway V2). Edit at /profile in the UI.
